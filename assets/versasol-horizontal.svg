<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 72" width="270" height="72">
  <title>VersaSol — Logo Horizontal</title>
  <desc>Marca principal VersaSol. Texto en blanco (uso sobre fondos oscuros). Primary: #1B6FF8. Accent: #00C8B8.</desc>

  <g id="Symbol">
    <polygon id="slash-primary"   points="0,8 14,8 36,56 22,56"  fill="#1B6FF8"/>
    <polygon id="slash-secondary" points="22,8 36,8 58,56 44,56" fill="#1B6FF8" opacity="0.45"/>
    <polygon id="slash-ghost"     points="36,8 50,8 28,56 14,56" fill="#FFFFFF" opacity="0.07"/>
  </g>

  <g id="Wordmark">
    <text id="brand-name" x="66" y="38"
      font-family="'Libre Franklin', 'DM Sans', Arial, sans-serif"
      font-weight="700" font-size="28" fill="#FFFFFF" letter-spacing="-0.2">VersaSol</text>
    <text id="tagline" x="67" y="58"
      font-family="'DM Sans', Arial, sans-serif"
      font-weight="500" font-size="11" fill="#7A90AE" letter-spacing="3.2">VERSATILE SOLUTIONS</text>
  </g>
</svg>
